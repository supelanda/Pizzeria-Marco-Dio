<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ordine Asporto — Pizzeria Marco</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="pizzeria-marco-base.css">

<style>
.form-section {
  padding: 10rem 0 6rem;
}

.form-box {
  max-width: 520px;
  margin: 0 auto;
  border: 1px solid var(--border);
  padding: 2.5rem;
  background: var(--panel);
}

.form-title {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  margin-bottom: 2rem;
}

.field {
  margin-bottom: 1.4rem;
}

.field label {
  display:block;
  font-size:.75rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:.4rem;
}

.field input,
.field textarea {
  width:100%;
  padding:.7rem;
  background:rgba(26,18,9,.85);
  border:1px solid var(--border);
  color:var(--cream);
}

.field textarea {
  resize:vertical;
  min-height:90px;
}

.error {
  font-size:.8rem;
  color:#e07060;
  margin-top:.3rem;
}

button {
  width:100%;
}

.toast {
  position:fixed;
  bottom:2rem;
  left:50%;
  transform:translateX(-50%);
  background:var(--gold);
  color:var(--ink);
  padding:1rem 2rem;
  display:none;
}
</style>
</head>

<body>

<nav>
  <a href="index.html" class="nav-logo">Pizzeria <span>Marco</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="pizzeria-marco-dove-siamo.html">Prenota</a></li>
    <li><a href="pizzeria-marco-asporto.html" class="active">Asporto</a></li>
  </ul>
</nav>

<section class="form-section">
  <div class="container">
    <div class="form-box">

      <div class="form-title">Ordina da asporto</div>

      <form id="form">

        <div class="field">
          <label>Nome</label>
          <input type="text" id="nome">
          <div class="error" id="errNome"></div>
        </div>

        <div class="field">
          <label>Telefono</label>
          <input type="tel" id="telefono">
          <div class="error" id="errTel"></div>
        </div>

        <div class="field">
          <label>Orario ritiro</label>
          <input type="time" id="ora">
          <div class="error" id="errOra"></div>
        </div>

        <div class="field">
          <label>Ordine</label>
          <textarea id="ordine" placeholder="Es: 2 margherite, 1 diavola..."></textarea>
          <div class="error" id="errOrdine"></div>
        </div>

        <div class="field">
          <label>Note</label>
          <textarea id="note"></textarea>
        </div>

        <button class="btn-primary">Invia ordine</button>

      </form>

    </div>
  </div>
</section>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = 'https://YOUR_PROJECT_REF.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_ANON_PUBLIC_KEY';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById('form');
const toast = document.getElementById('toast');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  let nome = nomeInput.value.trim();
  let telefono = telefonoInput.value.trim();
  let ora = oraInput.value;
  let ordine = ordineInput.value.trim();
  let note = noteInput.value.trim();

  let error = false;

  if (!nome) { errNome.textContent = "Inserisci nome"; error = true; }
  if (!telefono) { errTel.textContent = "Inserisci telefono"; error = true; }
  if (!ora) { errOra.textContent = "Inserisci orario"; error = true; }
  if (!ordine) { errOrdine.textContent = "Inserisci ordine"; error = true; }

  if (error) return;

  const { error: dbError } = await supabase.from('ordini_asporto').insert({
    nome,
    telefono,
    ora,
    ordine,
    note: note || null,
    stato: 'in_preparazione'
  });

  if (dbError) {
    toast.textContent = "Errore durante l'invio. Riprova.";
  } else {
    toast.textContent = "Ordine inviato! 🍕";
    form.reset();
  }

  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 3000);
});
</script>

</body>
</html>
